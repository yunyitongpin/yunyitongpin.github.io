name: Deploy to GitHub Pages

on:
  # 推送到 main 分支时自动构建并部署
  push:
    branches: [main]
  # 允许在 Actions 页面手动触发
  workflow_dispatch:

# GitHub Pages 部署所需的最小权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只保留一个部署，新的推送不会取消正在进行的发布
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # SPA 使用 history 路由，深链接刷新（如 /games）需要 404 兜底回 index.html
      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
